name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for setuptools_scm to resolve version from tags

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify packaged discovery artefacts
        run: |
          python - <<'PY'
          import json
          import zipfile
          from pathlib import Path

          wheels = list(Path('dist').glob('*.whl'))
          if len(wheels) != 1:
              raise SystemExit(f'Expected one wheel, found {len(wheels)}')

          required = {
              'ffbb_api_client_v3/data/collections.json',
              'ffbb_api_client_v3/data/endpoint_discovery.json',
              'ffbb_api_client_v3/data/indexes.json',
              'ffbb_api_client_v3/data/openapi.json',
              'ffbb_api_client_v3/data/openapi_full.json',
          }
          with zipfile.ZipFile(wheels[0]) as wheel:
              names = set(wheel.namelist())
              missing = sorted(required - names)
              if missing:
                  raise SystemExit(f'Missing discovery artefacts in wheel: {missing}')
              with wheel.open('ffbb_api_client_v3/data/endpoint_discovery.json') as handle:
                  json.load(handle)
          print('Discovery artefacts are present in the wheel.')
          PY

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for OIDC Trusted Publisher

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

  notify-mcp-server:
    name: Notify FFBB-MCP-Server
    needs: publish-pypi
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch bump event to FFBB-MCP-Server
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.MCP_SERVER_PAT }}
          repository: nickdesi/FFBB-MCP-Server
          event-type: ffbb-client-released
          client-payload: '{"version": "${{ github.ref_name }}"}'
