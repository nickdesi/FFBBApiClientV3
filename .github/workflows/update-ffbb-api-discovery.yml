name: Update FFBB API Discovery

on:
  schedule:
    # Refresh live FFBB API discovery every day at 05:17 UTC.
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-discovery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install package
        run: python -m pip install -e .

      - name: Refresh FFBB API discovery artefacts
        run: python scripts/discover_endpoints.py

      - name: Detect structural discovery changes
        id: changes
        run: |
          if grep -Eq '^- (Added|Removed): \[' data/api_update_summary.md; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No structural discovery changes detected; skipping PR."
          fi

      - name: Upload discovery summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ffbb-api-update-summary
          path: data/api_update_summary.md
          if-no-files-found: ignore
          retention-days: 14

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-ffbb-api-discovery
          delete-branch: true
          commit-message: 'chore: refresh FFBB API discovery artefacts'
          title: 'chore: refresh FFBB API discovery artefacts'
          body-path: data/api_update_summary.md
          labels: |
            automation
            ffbb-api
          add-paths: |
            data/endpoint_discovery.json
            data/collections.json
            data/indexes.json
            data/openapi.json
            data/openapi_full.json
            data/api_update_summary.md
            src/ffbb_data_client/data/__init__.py
            src/ffbb_data_client/data/collections.json
            src/ffbb_data_client/data/endpoint_discovery.json
            src/ffbb_data_client/data/indexes.json
            src/ffbb_data_client/data/openapi.json
            src/ffbb_data_client/data/openapi_full.json
