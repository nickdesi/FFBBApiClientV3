name: Check Wrapper Parity

on:
  push:
    branches: [master]
    paths:
      - 'src/ffbb_api_client_v3/clients/**'
  pull_request:
    paths:
      - 'src/ffbb_api_client_v3/clients/**'
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  check-parity:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run parity check
        id: parity
        run: python .github/scripts/check_wrapper_parity.py
