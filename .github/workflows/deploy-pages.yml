name: Deploy landing page to Pages

on:
  push:
    branches: ["master"]
  # Permet de lancer manuellement depuis l'onglet Actions
  workflow_dispatch:

# Permissions par défaut minimales
permissions:
  contents: read

# Permet d'annuler les déploiements obsolètes
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Inject Dynamic Version for SEO
        run: |
          set -euo pipefail
          LATEST_TAG=$(git describe --tags --abbrev=0)
          VERSION=${LATEST_TAG#v}
          echo "Dernière version trouvée : $VERSION. Injection dans le JSON-LD Schema..."
          sed -i "s/\"softwareVersion\": \"[^\"]*\"/\"softwareVersion\": \"$VERSION\"/g" website/index.html

      - name: Add Pages marker
        run: touch website/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
